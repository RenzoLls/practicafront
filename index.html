<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSA - Intérprete de Palabras Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>

    <style>
        :root { --celeste: #72c3e4; --celeste-oscuro: #3a96bd; --blanco: #ffffff; --rojo: #e74c3c; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #aedef4 0%, #72c3e4 100%);
            margin: 0; display: flex; height: 100vh; overflow: hidden; color: #2c3e50;
        }

        .sidebar {
            width: 320px; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1); z-index: 10;
        }

        .vocab-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            overflow-y: auto; max-height: 45vh; padding-right: 5px;
        }

        .btn-word {
            padding: 15px 5px; border: none; border-radius: 10px;
            background: var(--celeste); color: white; font-weight: bold;
            cursor: pointer; transition: 0.2s; font-size: 0.8rem; text-transform: uppercase;
        }

        .btn-word.trained { border: 2px solid #2ecc71; background: #e8f8f0; color: #2ecc71; }

        .main-content {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }

        .video-card {
            background: white; padding: 15px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative;
        }

        canvas { width: 100%; max-width: 640px; border-radius: 15px; transform: scaleX(-1); }
        video { display: none; }

        .output-panel {
            width: 100%; max-width: 640px; background: white;
            margin-top: 20px; padding: 20px; border-radius: 20px;
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        #word-display {
            font-size: 3.5rem; font-weight: 800; color: var(--celeste-oscuro);
            min-height: 80px; margin-bottom: 10px; text-transform: uppercase;
        }

        .btn-action {
            padding: 10px 15px; border: none; border-radius: 20px;
            background: #34495e; color: white; cursor: pointer; font-weight: bold;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>LSA Intérprete</h2>
        <p style="font-size: 0.8rem; color: #7f8c8d;">Entrená conceptos completos:</p>

        <div class="vocab-grid" id="vocab-grid"></div>

        <hr>
        <div style="display: flex; gap: 5px;">
            <button class="btn-action" style="background: #3498db; flex: 1;" onclick="guardarModelo()">💾 Guardar</button>
            <button class="btn-action" style="background: #9b59b6; flex: 1;" onclick="cargarModelo()">📂 Cargar</button>
        </div>

        <div style="background: rgba(231, 76, 60, 0.1); padding: 10px; border-radius: 10px;">
            <p style="font-size: 0.7rem; font-weight: bold; color: var(--rojo); margin-top:0;">RESETEAR SEÑA:</p>
            <input type="text" id="delete-label" placeholder="Palabra a borrar" style="width: 80%; padding: 5px; margin-bottom: 5px;">
            <button class="btn-action" style="background: var(--rojo); width: 100%;" onclick="limpiarEspecifica()">Borrar Ejemplos</button>
        </div>

        <p id="info-text" style="font-size: 0.85rem; font-weight: bold; color: #3a96bd;">Iniciando sistema...</p>
        <input type="file" id="file-selector" style="display:none" onchange="importarArchivo(event)">
    </div>

    <div class="main-content">
        <div class="video-card">
            <canvas id="output_canvas"></canvas>
            <video id="input_video" playsinline></video>
        </div>

        <div class="output-panel">
            <div id="word-display">ESPERANDO...</div>
            <p style="color: #bdc3c7; font-size: 0.9rem;">Mantené la seña estable para que el traductor hable</p>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const wordDisplay = document.getElementById('word-display');
        const infoText = document.getElementById('info-text');

        let classifier;
        let ultimaPalabraDetectada = "";
        let framesMismaPalabra = 0;
        let bloqueoEscritura = false;
        let currentLandmarks = null;

        // --- VOCABULARIO ---
        const vocabulario = ["HOLA", "GRACIAS", "COMO ESTAS", "AYUDA", "PERDON", "POR FAVOR", "BIEN", "MAL", "SI", "NO"];
        const grid = document.getElementById('vocab-grid');

        vocabulario.forEach(palabra => {
            const btn = document.createElement('button');
            btn.innerText = palabra;
            btn.className = 'btn-word';
            btn.onclick = () => entrenarPalabra(palabra, btn);
            grid.appendChild(btn);
        });

        async function setupML() {
            classifier = knnClassifier.create();
            infoText.innerText = "IA de Palabras Lista.";
        }

        function onResults(results) {
            canvasElement.width = 640; canvasElement.height = 480;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, 640, 480);
            canvasCtx.drawImage(results.image, 0, 0, 640, 480);

            currentLandmarks = results.multiHandLandmarks;

            if (currentLandmarks && currentLandmarks.length > 0) {
                for (const landmarks of currentLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#72c3e4', lineWidth: 4});
                    drawLandmarks(canvasCtx, landmarks, {color: '#ffffff', radius: 4});
                }
                predecirPalabra(currentLandmarks);
            }
            canvasCtx.restore();
        }

        function getFeatures(multiLandmarks) {
            let features = [];
            for (let i = 0; i < 2; i++) {
                if (multiLandmarks && multiLandmarks[i]) {
                    const lm = multiLandmarks[i];
                    const wrist = lm[0];
                    const middleBase = lm[9];
                    const handSize = Math.sqrt(Math.pow(wrist.x - middleBase.x, 2) + Math.pow(wrist.y - middleBase.y, 2)) || 1;

                    features.push(...lm.flatMap(l => [
                        (l.x - wrist.x) / handSize,
                        (l.y - wrist.y) / handSize,
                        ((l.z - wrist.z) / handSize) * 2 // Profundidad aumentada
                    ]));
                } else {
                    features.push(...Array(63).fill(0));
                }
            }
            return features;
        }

        function entrenarPalabra(palabra, btn) {
            if (currentLandmarks) {
                const features = getFeatures(currentLandmarks);
                classifier.addExample(tf.tensor(features), palabra);
                btn.classList.add('trained');
                infoText.innerText = `Entrenando ${palabra}: ${classifier.getClassExampleCount()[palabra]} capturas`;
            }
        }

        async function predecirPalabra(multiLandmarks) {
            if (classifier && classifier.getNumClasses() > 0 && !bloqueoEscritura) {
                const features = getFeatures(multiLandmarks);
                const result = await classifier.predictClass(tf.tensor(features));
                const { label, confidences } = result;

                // Umbral alto para evitar falsos positivos en palabras
                if (confidences[label] > 0.94) {
                    if (label === ultimaPalabraDetectada) {
                        framesMismaPalabra++;
                    } else {
                        ultimaPalabraDetectada = label;
                        framesMismaPalabra = 0;
                    }

                    // Si mantiene la seña estable por medio segundo (aprox 15 frames)
                    if (framesMismaPalabra === 15) {
                        ejecutarVoz(label);
                    }
                }
            }
        }

        function ejecutarVoz(palabra) {
            bloqueoEscritura = true;
            wordDisplay.innerText = palabra;
            wordDisplay.style.color = "#2ecc71";

            const msg = new SpeechSynthesisUtterance(palabra);
            msg.lang = 'es-AR';
            window.speechSynthesis.speak(msg);

            // Bloqueamos para que no repita la misma palabra seguido
            setTimeout(() => {
                bloqueoEscritura = false;
                wordDisplay.style.color = "#3a96bd";
                framesMismaPalabra = 0;
            }, 3000);
        }

        // --- GESTIÓN DE DATOS ---
        function guardarModelo() {
            const dataset = classifier.getClassifierDataset();
            const datasetObj = {};
            Object.keys(dataset).forEach((key) => {
                datasetObj[key] = Array.from(dataset[key].dataSync());
            });
            const blob = new Blob([JSON.stringify(datasetObj)], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "interprete_lsa_pro.json";
            a.click();
        }

        function cargarModelo() { document.getElementById('file-selector').click(); }

        function importarArchivo(event) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const datasetObj = JSON.parse(e.target.result);
                const tensorObj = {};
                Object.keys(datasetObj).forEach((key) => {
                    tensorObj[key] = tf.tensor2d(datasetObj[key], [datasetObj[key].length / 126, 126]);
                });
                classifier.setClassifierDataset(tensorObj);
                infoText.innerText = "Vocabulario cargado.";
                // Marcar botones como entrenados
                Object.keys(datasetObj).forEach(pal => {
                    const btn = Array.from(document.querySelectorAll('.btn-word')).find(b => b.innerText === pal);
                    if(btn) btn.classList.add('trained');
                });
            };
            reader.readAsText(event.target.files[0]);
        }

        function limpiarEspecifica() {
            const label = document.getElementById('delete-label').value.toUpperCase();
            if(classifier && label) {
                try {
                    classifier.clearClass(label);
                    const btn = Array.from(document.querySelectorAll('.btn-word')).find(b => b.innerText === label);
                    if(btn) btn.classList.remove('trained');
                    infoText.innerText = `Borrada seña: ${label}`;
                } catch(e) { infoText.innerText = "No se encontró esa seña."; }
            }
        }

        // --- INICIO ---
        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.75, minTrackingConfidence: 0.75});
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });

        setupML().then(() => camera.start());
    </script>
</body>
</html>
